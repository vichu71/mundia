# Rate limiting: max 10 intentos/min por IP en endpoints de autenticación
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# ── Redireccion HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    server_name mundial.vicai.es;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name mundial.vicai.es;

    ssl_certificate     /etc/nginx/certs/live/mundial.vicai.es/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/mundial.vicai.es/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    # ─── Auth (rate limited) ──────────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://82.223.205.118:8086/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://82.223.205.118:8086/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Frontend SPA ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://82.223.205.118:5010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
