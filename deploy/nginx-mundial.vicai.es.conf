# ── Redireccion HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    server_name mundial.vicai.es;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name mundial.vicai.es;

    ssl_certificate     /etc/nginx/certs/live/mundial.vicai.es/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/mundial.vicai.es/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # ─── Backend API ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://82.223.205.118:8086/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Frontend SPA ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://82.223.205.118:5010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
